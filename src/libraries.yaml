--- !ys-0

defn yamlscript(site)::
  name: YAMLScript
  desc: YAMLScript YAML loader
  site:: site
  tycs: true
  v12: true
  active: true
  merge: true
  license: MIT

defn yamlstar(site)::
  name: YAMLStar
  desc: YAML 1.2 loader
  site:: site
  tycs: true
  v12: true
  safe: true
  active: true
  license: MIT


